deptrac:
  paths:
    - ./src

  exclude_files:
    - '#.*test.*#'
    - '#.*Infrastructure/Providers/.*#'

  layers:
    - name: Domain
      collectors:
        - type: classNameRegex
          value: '#^BrickNPC\\EloquentDDD\\Domain\\.*#'

    - name: Application
      collectors:
        - type: classNameRegex
          value: '#^BrickNPC\\EloquentDDD\\Application\\.*#'

    - name: Infrastructure
      collectors:
        - type: classNameRegex
          value: '#^BrickNPC\\EloquentDDD\\Infrastructure\\.*#'

    - name: Vendor
      collectors:
        - type: classNameRegex
          value: '#^(Illuminate|Laravel|Symfony|Carbon|Composer|PHPUnit|Faker|Doctrine|Psr|GuzzleHttp|Mockery|Spatie)\\#'

  ruleset:
    Domain:
      - Vendor

    Application:
      - Domain
      - Vendor

    Infrastructure:
      - Application
      - Domain
      - Vendor